<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1B4F72">
  <title>Don Vital — Acceso Paciente</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #0f1923;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Georgia, 'Times New Roman', serif;
      padding: 2rem 1.5rem;
    }

    .container {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .logo {
      font-size: 4rem;
      margin-bottom: 1rem;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    h1 {
      color: #ffffff;
      font-size: 2rem;
      font-weight: 400;
      letter-spacing: 0.02em;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: #7fb3d3;
      font-size: 1.1rem;
      margin-bottom: 3rem;
    }

    .card {
      background: #1a2a3a;
      border-radius: 20px;
      padding: 2.5rem 2rem;
      border: 1px solid #2a4a6a;
    }

    label {
      display: block;
      color: #a8c8e8;
      font-size: 1rem;
      margin-bottom: 0.75rem;
      text-align: left;
    }

    input[type="tel"] {
      width: 100%;
      padding: 1.25rem 1.5rem;
      font-size: 1.5rem;
      font-family: Georgia, serif;
      background: #0f1923;
      border: 2px solid #2a4a6a;
      border-radius: 12px;
      color: #ffffff;
      text-align: center;
      letter-spacing: 0.1em;
      transition: border-color 0.2s;
      outline: none;
    }

    input[type="tel"]:focus {
      border-color: #4a9fd4;
    }

    input[type="tel"]::placeholder {
      color: #3a5a7a;
      letter-spacing: 0.05em;
    }

    .btn {
      width: 100%;
      padding: 1.25rem;
      margin-top: 1.5rem;
      font-size: 1.3rem;
      font-family: Georgia, serif;
      background: #1B4F72;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.03em;
    }

    .btn:hover { background: #2471a3; }
    .btn:active { transform: scale(0.98); }

    .error {
      background: #3a1a1a;
      border: 1px solid #c0392b;
      color: #e74c3c;
      padding: 1rem;
      border-radius: 10px;
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }

    .footer {
      margin-top: 2rem;
      color: #3a5a7a;
      font-size: 0.85rem;
    }

    .cuidador-link {
      display: block;
      margin-top: 1.5rem;
      color: #4a7a9a;
      font-size: 0.9rem;
      text-decoration: none;
    }
    .cuidador-link:hover { color: #7fb3d3; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">💊</div>
    <h1>Don Vital</h1>
    <p class="subtitle">Portal del Paciente</p>

    <div class="card">
      {% if error %}
      <div class="error">⚠️ {{ error }}</div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <label for="telefono">Ingresa tu número de celular</label>
        <input
          type="tel"
          id="telefono"
          name="telefono"
          placeholder="3001234567"
          autocomplete="tel"
          inputmode="numeric"
          autofocus
          required
        >
        <button type="submit" class="btn">Entrar →</button>
      </form>
    </div>

    <a href="/usuarios/login/" class="cuidador-link">¿Eres cuidador? Ingresa aquí</a>

    <p class="footer">Don Vital · Cuidado con amor</p>
  </div>
</body>
</html>
